<!doctype html>
<html lang="en" data-bs-theme="light">

<head>
  <title>Title</title>
  <!-- Required meta tags -->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap CSS v5.3.8 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">

  <link href="./style/style.css" rel="stylesheet">
</head>

<body class="body">
  <section>
    <div class="container">
      <div class="d-flex justify-content-center align-items-center my-5">
        <header>
          <h1>Medical tests</h1>
        </header>
      </div>
      <div class="d-flex justify-content-between mb-3 gap-3">
        <div>
        <button id="btnPlayTest" class="btn btn-outline-light useBtn">Пройти тест</button>
        <button id="btnSprintTest" class="btn btn-outline-light useBtn">Спринт тест</button>
        </div>
        <div class="d-flex">
          <button id="btnOpenStats" class="btn btn-outline-light useBtn">Статистика</button>
        </div>
      </div>
    </div>
  </section>

  <section id="section_search">
    <div class="container">
      <div class="row">
        <label  class="form-label">Поиск по заголовку теста.</label>
        <div class="input-group mb-3">
          <input type="text" class="form-control" id="searchInput" placeholder="Введите текст..."
            aria-label="Recipient's username" aria-describedby="searchButton">
          <button class="btn btn-outline-info d-flex justify-content-center align-items-center" type="button"
            id="searchButton" title="Найти">
            <svg xmlns="http://www.w3.org/2000/svg" style="width: 21px; height: 21px;" class="ionicon"
              viewBox="0 0 512 512">
              <path d="M221.09 64a157.09 157.09 0 10157.09 157.09A157.1 157.1 0 00221.09 64z" fill="none"
                stroke="currentColor" stroke-miterlimit="10" stroke-width="32" />
              <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-miterlimit="10" stroke-width="32"
                d="M338.29 338.29L448 448" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </section>

  <section>
    <div class="container ">
      <div class="row">
        <div id="results"> 
        </div>
      </div>
    </div>
  </section>
  <br><br><br><br><br><br><br><br><br><br><br>
  <!-- Bootstrap JavaScript Bundle (includes Popper) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script type="module" src="./js/js.js"></script>
</body>

</html>
